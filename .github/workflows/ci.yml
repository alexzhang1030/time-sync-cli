name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            artifact: timesync-linux-amd64
            debarch: amd64
          - goos: linux
            goarch: arm64
            artifact: timesync-linux-arm64
            debarch: arm64
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test ./...

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: go build -trimpath -ldflags="-s -w" -o "${{ matrix.artifact }}" ./cmd/timesync

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

      - name: Install nfpm
        run: go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest

      - name: Build deb package
        env:
          DEB_ARCH: ${{ matrix.debarch }}
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            export VERSION="${GITHUB_REF#refs/tags/v}"
          else
            export VERSION="0.0.0-dev"
          fi
          cp "${{ matrix.artifact }}" timesync
          mkdir -p dist
          nfpm package --config nfpm.yaml --packager deb --target "dist/timesync_${VERSION}_${DEB_ARCH}.deb"

      - name: Upload deb artifact
        uses: actions/upload-artifact@v7
        with:
          name: timesync-deb-${{ matrix.debarch }}
          path: dist/*.deb

  release:
    needs: test-and-build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          pattern: timesync-*
          merge-multiple: true

      - uses: softprops/action-gh-release@v3
        with:
          files: dist/*
