name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            artifact: timesync-linux-amd64
          - goos: linux
            goarch: arm64
            artifact: timesync-linux-arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test ./...

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          VERSION="dev"
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF_NAME}"
          fi
          go build -ldflags "-X main.version=${VERSION}" -o "${{ matrix.artifact }}" ./cmd/timesync

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  package-smoke:
    needs: test-and-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: timesync-linux-amd64
          path: .

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install nfpm
        run: go install github.com/goreleaser/nfpm/v2/cmd/nfpm@v2.41.2

      - name: Build packages (smoke)
        run: |
          export PATH="$(go env GOPATH)/bin:$PATH"
          packaging/build-packages.sh 0.0.0-ci amd64 timesync-linux-amd64 dist/packages
          test -n "$(ls dist/packages/*.deb dist/packages/*.rpm)"

  package:
    needs: test-and-build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goarch: amd64
            artifact: timesync-linux-amd64
          - goarch: arm64
            artifact: timesync-linux-arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: .

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install nfpm
        run: go install github.com/goreleaser/nfpm/v2/cmd/nfpm@v2.41.2

      - name: Build .deb and .rpm
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          export PATH="$(go env GOPATH)/bin:$PATH"
          packaging/build-packages.sh "$VERSION" "${{ matrix.goarch }}" "${{ matrix.artifact }}" dist/packages

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: packages-${{ matrix.goarch }}
          path: dist/packages/*

  release:
    needs: [test-and-build, package]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: "*"
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          fail_on_unmatched_files: true
          generate_release_notes: true
